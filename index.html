const OVERRIDES_KEY = 'audit_import_overrides_v1';
let importedOverrides = {};
let DATA = {};

let activeTab = null;
let state = {};
let stateLoaded = false;
let searchQuery = "";

function loadOverrides(){
  try{
    const raw = localStorage.getItem(OVERRIDES_KEY);
    importedOverrides = raw ? JSON.parse(raw) : {};
  }catch(e){
    importedOverrides = {};
  }
}
function saveOverrides(){
  try{
    localStorage.setItem(OVERRIDES_KEY, JSON.stringify(importedOverrides));
  }catch(e){
    console.error('overrides save failed', e);
    showModal('Не вдалося зберегти імпортовані дані на пристрої.');

function rebuildData(){
  DATA = JSON.parse(JSON.stringify(BASE_DATA));
  Object.keys(importedOverrides).forEach(key=>{
    DATA[key] = importedOverrides[key];
  });
  if(!activeTab || !DATA[activeTab]){
    activeTab = Object.keys(DATA)[0];
  }
}

// --- Excel import: parses "Оборотна відомість по товарно-матеріальних цінностях" xlsx exports ---

function cleanItemName(raw){
  // Strips a trailing batch-price suffix like "/20442,00" or " -1950,00"
  // that this report sometimes appends to the item name. Only strips when
  // clearly separated by "/" or " -" so real model numbers (e.g. "LIDE-2500")
  // aren't damaged.
  return String(raw)
    .replace(/(?:\/|\s-)\s*\d{1,3}(?:\d{3})*[.,]\d{2}\s*$/, '')
    .trim();
}

function parseContragentInfo(inner){
  const parts = inner.split(';').map(s=>s.trim());
  const code = parts[0] || '';
  let name = parts[1] || '';
  let qCount = 0;
  name = name.replace(/"/g, ()=>{ qCount++; return qCount % 2 === 1 ? '«' : '»'; });

  const codeLabel = code.length === 8 ? 'ЄДРПОУ' : (code.length === 10 ? 'ІПН' : 'код');
  const contragent = code ? `${name} (${codeLabel} ${code})` : name;

  const label1 = parts[2], num1 = parts[3], date1 = parts[4];
  const label2 = parts[5], num2 = parts[6], date2 = parts[7];
  let contract = '';
  if(label1 && num1 && date1){
    contract = `${label1} ${num1} від ${date1}`;
    if(label2 && num2 && date2 && !(label2===label1 && num2===num1 && date2===date1)){
      contract += ` · ${label2} ${num2} від ${date2}`;
    }
  }
  return {contragent, contract};
}

function parseBatchHeader(raw){
  const m = raw.match(/^(\d+)\s*\[(\d+)\][^]*?Аналітика:\s*([\d.]+)\s*(?:\((.*)\))?\s*$/);
  if(!m) return null;
  const account = `${m[1]} [${m[2]}]`;
  const analytics = m[3];
  const inner = m[4];
  if(inner){
    const {contragent, contract} = parseContragentInfo(inner);
    return {account, analytics, contragent, contract, continuation:false};
  }
  return {
    account, analytics,
    contragent: null,
    contract: `Продовження аналітики ${analytics} — реквізити договору без змін`,
    continuation: true
  };
}

function parseTurnoverSheet(rows, filename){
  const batches = [];
  let curBatch = null;
  let lastContragent = null;
  let accPrefix = null;

  rows.forEach(row=>{
    const c0raw = row[0];
    if(c0raw === null || c0raw === undefined) return;
    const c0 = String(c0raw).trim();
    if(!c0) return;

    if(/Аналітика:/.test(c0)){
      const parsed = parseBatchHeader(c0);
      if(!parsed) return;
      if(!accPrefix) accPrefix = parsed.account.slice(0, 4);
      let contragent = parsed.contragent;
      if(contragent){
        lastContragent = contragent;
      }else{
        contragent = (lastContragent || 'Той самий контрагент') + ' (та сама партія)';
      }
      curBatch = {
        id: 'b' + (batches.length + 1),
        account: parsed.account,
        analytics: parsed.analytics,
        contragent,
        contract: parsed.contract,
        items: []
      };
      batches.push(curBatch);
      return;
    }

    const low = c0.toLowerCase();
    if(low.startsWith('разом') || low.startsWith('всього') || low.startsWith('итого')) return;

    if(curBatch && /^\d+$/.test(c0)){
      const nomen = row[1] != null ? String(row[1]).trim() : '';
      const name = row[2] != null ? cleanItemName(row[2]) : '';
      const unit = row[3] != null ? String(row[3]).trim() : 'шт';
      const price = Number(row[4]) || 0;
      const qty = Number(row[12]) || 0;   // кінцеве сальдо, кількість
      const sum = Number(row[13]) || 0;   // кінцеве сальдо, сума
      if(nomen && name && qty > 0){
        curBatch.items.push({nomen, name, unit, price, qty, sum});
      }
    }
  });

  const nonEmptyBatches = batches.filter(b=>b.items.length > 0);
  const key = accPrefix || ('imp_' + Date.now());
  const label = filename.replace(/\.[^.]+$/, '').replace(/^\d+_/, '') || key;
  return {key, label, title: `Рахунок ${key}`, batches: nonEmptyBatches};
}

function findTargetKey(label){
  const norm = s => String(s || '').trim().toLowerCase();
  const wanted = norm(label);
  const keys = Object.keys(DATA);
  let found = keys.find(k => norm(DATA[k].label) === wanted);
  if(found) return found;
  found = keys.find(k => wanted && (norm(DATA[k].label).includes(wanted) || wanted.includes(norm(DATA[k].label))));
  if(found) return found;
  return null;
}

async function importExcelFiles(fileList){
  const files = Array.from(fileList || []);
  if(files.length === 0) return;
  const statusEl = document.getElementById('importStatus');
  const results = [];

  for(const file of files){
    try{
      statusEl.textContent = `Обробка "${file.name}"…`;
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null, raw:true});
      const parsed = parseTurnoverSheet(rows, file.name);
      if(parsed.batches.length === 0){
        results.push(`«${file.name}»: жодної позиції не розпізнано`);
        continue;
      }
      const itemCount = parsed.batches.reduce((s,b)=>s+b.items.length,0);
      const targetKey = findTargetKey(parsed.label) || activeTab || Object.keys(DATA)[0];
      const existing = DATA[targetKey];
      const label = existing ? existing.label : parsed.label;
      const title = existing ? existing.title : parsed.title;
      importedOverrides[targetKey] = {label, title, batches: parsed.batches};
      const matchNote = (existing && findTargetKey(parsed.label) === targetKey)
        ? ''
        : ` (мітку "${parsed.label}" не знайдено серед наявних вкладок — дані оновлено у вкладці "${label}")`;
      results.push(`«${file.name}» → вкладка "${label}": ${parsed.batches.length} партій, ${itemCount} позицій${matchNote}`);
    }catch(err){
      console.error(err);
      results.push(`«${file.name}»: помилка читання (${err.message})`);
    }
  }

  saveOverrides();
  rebuildData();
  render();
  statusEl.textContent = '';
  showModal(results.join('\n'));
}

function fmt(n){
  return Number(n).toLocaleString('uk-UA', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function itemId(accKey, batchId, idx){
  return accKey + "__" + batchId + "__" + idx;
}

const STORAGE_KEY = 'audit_state_v1';

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    state = raw ? JSON.parse(raw) : {};
  }catch(e){
    state = {};
  }
  stateLoaded = true;
}
function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }catch(e){
    console.error('storage save failed', e);
    showModal('Не вдалося зберегти дані на пристрої. Перевірте налаштування браузера (приватний режим блокує збереження).');
  }
}

function getEntry(id){
  if(!state[id]) state[id] = {found:0, done:false, note:""};
  return state[id];
}

function renderTabs(){
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = "";
  Object.keys(DATA).forEach(key=>{
    const btn = document.createElement('div');
    btn.className = 'tab-btn' + (key===activeTab ? ' active' : '');
    btn.textContent = DATA[key].label;
    btn.onclick = ()=>{ activeTab = key; render(); };
    tabsEl.appendChild(btn);
  });
}

function computeOverall(){
  let totalItems=0, doneItems=0;
  Object.keys(DATA).forEach(accKey=>{
    DATA[accKey].batches.forEach(batch=>{
      batch.items.forEach((it, idx)=>{
        totalItems++;
        const id = itemId(accKey, batch.id, idx);
        if(getEntry(id).done) doneItems++;
      });
    });
  });
  return {totalItems, doneItems};
}

function renderHeader(){
  const {totalItems, doneItems} = computeOverall();
  const pct = totalItems ? Math.round(doneItems/totalItems*100) : 0;
  document.getElementById('overallBar').style.width = pct + "%";
  document.getElementById('overallLabel').textContent = doneItems + " / " + totalItems;
}

function renderMain(){
  const main = document.getElementById('main');
  main.innerHTML = "";

  const searchRow = document.createElement('div');
  searchRow.className = 'search-row';
  searchRow.innerHTML = `<input type="text" id="searchInput" placeholder="Пошук за назвою або номенклатурним номером" value="${searchQuery.replace(/"/g,'&quot;')}">`;
  main.appendChild(searchRow);
  searchRow.querySelector('input').addEventListener('input', (e)=>{
    searchQuery = e.target.value.toLowerCase();
    renderBatches();
  });

  const batchesWrap = document.createElement('div');
  batchesWrap.id = 'batchesWrap';
  main.appendChild(batchesWrap);

  renderBatches();
}

function renderBatches(){
  const accKey = activeTab;
  const wrap = document.getElementById('batchesWrap');
  wrap.innerHTML = "";
  const accData = DATA[accKey];

  accData.batches.forEach(batch=>{
    const visibleItems = batch.items
      .map((it, idx)=>({it, idx}))
      .filter(({it})=> !searchQuery ||
        it.name.toLowerCase().includes(searchQuery) ||
        it.nomen.toLowerCase().includes(searchQuery));

    if(visibleItems.length === 0) return;

    let batchFoundQty=0, batchTargetQty=0, batchDone=0;
    batch.items.forEach((it, idx)=>{
      const id = itemId(accKey, batch.id, idx);
      const e = getEntry(id);
      batchFoundQty += Math.min(e.found, it.qty);
      batchTargetQty += it.qty;
      if(e.done) batchDone++;
    });

    const batchEl = document.createElement('div');
    batchEl.className = 'batch';
    batchEl.innerHTML = `
      <div class="batch-head">
        <div class="acc">${batch.account} · аналітика ${batch.analytics}</div>
        <div class="contragent">${batch.contragent}</div>
        <div class="contract">${batch.contract}</div>
        <div class="batch-summary">
          <span>Перевірено: ${batchDone} / ${batch.items.length}</span>
          <span>К-сть: ${fmt(batchFoundQty)} / ${fmt(batchTargetQty)}</span>
        </div>
      </div>
    `;

    visibleItems.forEach(({it, idx})=>{
      const id = itemId(accKey, batch.id, idx);
      const entry = getEntry(id);
      const found = Math.min(entry.found, it.qty);
      const pct = it.qty ? Math.min(100, Math.round(found/it.qty*100)) : 0;

      const card = document.createElement('div');
      card.className = 'item' + (entry.done ? ' done' : '');
      card.innerHTML = `
        <div class="stamp">перевірено</div>
        <div class="item-top">
          <span class="nomen">${it.nomen}</span>
        </div>
        <div class="name">${it.name}</div>
        <div class="meta-row">
          <span>Ціна: ${fmt(it.price)} грн</span>
          <span>${it.unit} · ${fmt(it.qty)} шт · ${fmt(it.sum)} грн</span>
        </div>
        <div class="qty-row">
          <div class="qty-bar-wrap">
            <div class="qty-text"><span>Знайдено: ${fmt(found)} / ${fmt(it.qty)}</span><span>${pct}%</span></div>
            <div class="qty-bar"><div style="width:${pct}%"></div></div>
          </div>
        </div>
        <div class="add-row">
          <input type="number" min="0" step="1" placeholder="+к-сть" class="add-input">
          <button class="add-btn">Додати</button>
          <button class="clear-btn">Скинути</button>
          <button class="toggle-btn">${entry.done ? 'Знято позначку' : 'Позначити знайденим'}</button>
        </div>
        <textarea class="note" placeholder="Хто зберігає / примітка">${entry.note || ""}</textarea>
      `;

      const addInput = card.querySelector('.add-input');
      const addBtn = card.querySelector('.add-btn');
      const clearBtn = card.querySelector('.clear-btn');
      const toggleBtn = card.querySelector('.toggle-btn');
      const noteEl = card.querySelector('.note');

      addBtn.onclick = ()=>{
        const val = parseFloat(addInput.value);
        if(!val || val <= 0) return;
        entry.found = (entry.found || 0) + val;
        if(entry.found >= it.qty) entry.done = true;
        addInput.value = "";
        saveState();
        renderBatches();
        renderHeader();
      };

      clearBtn.onclick = ()=>{
        entry.found = 0;
        entry.done = false;
        saveState();
        renderBatches();
        renderHeader();
      };

      toggleBtn.onclick = ()=>{
        entry.done = !entry.done;
        saveState();
        renderBatches();
        renderHeader();
      };

      let noteTimer;
      noteEl.addEventListener('input', ()=>{
        entry.note = noteEl.value;
        clearTimeout(noteTimer);
        noteTimer = setTimeout(saveState, 500);
      });

      batchEl.appendChild(card);
    });

    wrap.appendChild(batchEl);
  });
}

function render(){
  renderTabs();
  renderHeader();
  renderMain();
}

function showModal(text, onConfirm){
  const overlay = document.getElementById('modalOverlay');
  const textEl = document.getElementById('modalText');
  const actionsEl = document.getElementById('modalActions');
  textEl.textContent = text;
  actionsEl.innerHTML = "";

  if(onConfirm){
    const cancelBtn = document.createElement('button');
    cancelBtn.textContent = 'Скасувати';
    cancelBtn.onclick = ()=>{ overlay.style.display = 'none'; };
    const okBtn = document.createElement('button');
    okBtn.className = 'confirm';
    okBtn.textContent = 'Скинути';
    okBtn.onclick = ()=>{ overlay.style.display = 'none'; onConfirm(); };
    actionsEl.appendChild(cancelBtn);
    actionsEl.appendChild(okBtn);
  }else{
    const okBtn = document.createElement('button');
    okBtn.textContent = 'Гаразд';
    okBtn.onclick = ()=>{ overlay.style.display = 'none'; };
    actionsEl.appendChild(okBtn);
  }
  overlay.style.display = 'flex';
}

document.getElementById('resetAllBtn').addEventListener('click', ()=>{
  showModal('Скинути всі позначки, кількості та примітки по всіх рахунках? Дію не можна скасувати.', ()=>{
    state = {};
    saveState();
    render();
  });
});

document.getElementById('importBtn').addEventListener('click', ()=>{
  document.getElementById('importFileInput').click();
});
document.getElementById('importFileInput').addEventListener('change', (e)=>{
  importExcelFiles(e.target.files);
  e.target.value = '';
});
document.getElementById('clearImportBtn').addEventListener('click', ()=>{
  if(Object.keys(importedOverrides).length === 0){
    showModal('Імпортованих рахунків ще немає.');
    return;
  }
  showModal('Скинути всі імпортовані з Excel рахунки й повернутися до вбудованих даних? Позначки перевірки для цих рахунків також буде втрачено.', ()=>{
    importedOverrides = {};
    saveOverrides();
    rebuildData();
    render();
  });
});

loadOverrides();
rebuildData();
loadState();
render();
</script>
</body>
</html>
